name: Publish

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

jobs:
  test:
    name: Test before publish
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: '20'
          cache: 'npm'

      - run: npm ci && npm run clean
      - run: npm run lint
      - run: npm test

  publish:
    name: Publish to npm
    runs-on: ubuntu-latest
    needs: test
    environment: npm
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: '20'
          cache: 'npm'
          registry-url: 'https://registry.npmjs.org'

      - run: npm ci

      - name: Debug npm auth
        run: |
          echo "npm version: $(npm --version)"
          echo "node version: $(node --version)"
          npm config list
          echo "OIDC URL set: $([ -n "$ACTIONS_ID_TOKEN_REQUEST_URL" ] && echo yes || echo no)"

      - name: Publish all packages
        run: npm publish --workspaces --access public --provenance --loglevel=verbose
        env:
          NODE_AUTH_TOKEN: ''
